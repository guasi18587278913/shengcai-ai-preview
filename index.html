<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#f4efe7" />
    <title>生财有术体验版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@600;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar" data-topbar>
      <div class="topbar-inner">
        <a class="brand" href="#top">
          <span class="brand-mark" aria-hidden="true">SC</span>
          <strong class="brand-name">生财有术</strong>
        </a>
      </div>
    </header>

    <main class="page" id="top">
      <section class="hero">
        <h1>AI 时代<br />找到你的赚钱方向</h1>
        <p class="hero-sub">超级标看方向、项目库挑机会、航海练实战、沙龙见同行、导师答疑问</p>
      </section>

      <nav class="nav-strip" aria-label="内容导航" data-nav-strip>
        <a class="nav-pill is-active" href="#sec-supermark" data-nav-item="supermark">超级标</a>
        <a class="nav-pill" href="#sec-library" data-nav-item="library">项目库</a>
        <a class="nav-pill" href="#sec-sea" data-nav-item="sea">大航海</a>
        <a class="nav-pill" href="#sec-meetup" data-nav-item="meetup">线下沙龙</a>
        <a class="nav-pill" href="#sec-mentor" data-nav-item="mentor">创业导师</a>
      </nav>

      <section class="sec" id="sec-supermark" data-section="supermark">
        <div class="sec-head">
          <h2>超级标</h2>
          <span class="sec-count" data-supermark-count>加载中</span>
        </div>
        <div class="feed" data-feed-list>
          <div class="feed-card feed-card--skeleton">
            <div class="feed-card-img"></div>
            <div class="feed-card-body"><h3>正在加载...</h3></div>
          </div>
        </div>
      </section>

      <section class="sec" id="sec-library" data-section="library">
        <div class="sec-head">
          <h2>项目库</h2>
          <span class="sec-count" data-project-count>加载中</span>
        </div>
        <div class="tabs" role="tablist" aria-label="项目分类" data-project-tabs></div>
        <div data-project-list>
          <div class="sec-empty" style="opacity:0.5">正在加载...</div>
        </div>
      </section>

      <section class="sec" id="sec-sea" data-section="sea">
        <div class="sec-head">
          <h2>AI 大航海</h2>
          <span class="sec-sub">历届航海实战</span>
        </div>
        <div data-activity-list>
          <div class="sec-empty" style="opacity:0.5">正在加载...</div>
        </div>
      </section>

      <section class="sec" id="sec-meetup" data-section="meetup">
        <div class="sec-head">
          <h2>AI 线下沙龙</h2>
          <span class="sec-sub">最近的城市活动</span>
        </div>
        <div class="meetup-list" data-meeting-list>
          <div class="meetup-card meetup-card--skeleton"><h3>正在加载...</h3></div>
        </div>
      </section>

      <section class="sec" id="sec-mentor" data-section="mentor">
        <div class="sec-head">
          <h2>AI 创业导师</h2>
          <span class="sec-sub">直接问</span>
        </div>
        <div class="mentor-box">
          <div class="ask-card">
            <label class="ask-label" for="ask-input">你现在想问什么？</label>
            <textarea
              class="ask-input"
              id="ask-input"
              rows="3"
              placeholder="我适合做哪个 AI 方向？"
              data-question-input
            ></textarea>
            <a
              class="btn btn-primary"
              href="https://scys.com/ai/yiren"
              target="_blank"
              rel="noopener"
              data-question-submit
            >进入 AI 问答</a>
          </div>
          <div class="example-area">
            <p class="example-title">先从这些问题开始</p>
            <div class="example-list" data-example-questions>
              <button class="example-btn" type="button">正在加载问题...</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
